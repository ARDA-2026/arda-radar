radar:
  cli_port: "/dev/ttyUSB0"
  data_port: "/dev/ttyUSB1"
  config_file: "config/profiles/xwr68xx_AOP_profile_short_range.cfg"

# main.py와 scripts/ 아래 실시간·분석 스크립트들이 공통으로 읽는
# 전처리/타겟 선택 튜닝값 (arda.utils.load_processing_config).
# 이전엔 각 스크립트 상단에 동일한 값이 개별 상수로 중복 정의돼 있었다 —
# 여기 한 곳만 고치면 전부에 반영된다.
processing:
  min_snr: 6.0           # 작은 물체의 약한 반사도 포착
  roi:
    x: [-1.0, 1.0]      # 좌우 ±1.0m
    y: [0.0, 1.5]       # 센서 전방 0.0~1.5m
    z: [-0.8, 0.8]      # 바닥 근처~선 키
  min_abs_doppler: 0.05  # 느린 낙하 포인트도 포착 (main.py의 filter_stationary 전용)
  cluster_eps: 0.15      # m — 10cm 물체 기준: 포인트 간 최대 거리 (물체 크기 + 측정 오차)
  cluster_min_samples: 2 # 단일 노이즈 포인트 제거, 10cm 물체는 보통 2개 이상 반환
  max_jump: 0.5          # m — 트랙 예측 위치 기준 클러스터 매칭 허용 거리 (다중 추적)

detection:
  history_window: 6
  height_drop_threshold: 0.3   # 조건 A: 윈도우 내 높이 변화량
  fall_doppler_threshold: -0.2  # 도플러 기준 (radial 성분 보정)
  z_velocity_threshold: -0.3   # 조건 B: 프레임 간 Z 순간 속도 (자유낙하 1프레임 내 감지)

visualization:
  enabled: true

# 이 레이더가 설치된 지점의 고정 실좌표 (m, 시설/도면 기준 좌표계).
# 이 좌표계는 "바닥 = Z 0"으로 정의한다 — 즉 site.z는 그 자체로 바닥
# 기준 센서 설치 높이다. 낙하 확정 시 센서 기준 로컬 좌표(X,Y)에 이
# 값을 더해 실좌표로 변환하며, Z는 항상 바닥(0)으로 간주한다 (아래
# "설치 위치 기준 실좌표 변환" README 섹션 참고). 평행이동만 반영하며,
# 센서 장착 방향(heading) 회전은 보정하지 않는다.
site:
  x: 0.0
  y: 0.0
  z: 1.1
